name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    uses: VibeSmiths/.github/.github/workflows/node-lint-test.yml@main
    secrets: inherit

  docker:
    needs: lint-test
    uses: VibeSmiths/.github/.github/workflows/docker-build.yml@main
    secrets: inherit
    with:
      image-name: mcp-yt-dlp
